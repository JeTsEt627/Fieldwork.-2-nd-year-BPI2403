server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Ограничение размера загружаемого файла (BE-02: до 20 МБ + запас).
    client_max_body_size 25m;

    # Статика SPA: при отсутствии файла отдаём index.html (клиентский роутинг).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API-запросов на бэкенд-сервис (имя app из docker-compose).
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Кеширование собранных ассетов с хешами в имени.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
