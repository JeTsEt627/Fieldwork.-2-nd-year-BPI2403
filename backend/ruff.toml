# Конфигурация линтера и форматтера Ruff (PEP 8).

line-length = 100
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (порядок импортов)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "E501",  # длина строки контролируется форматтером
]

[lint.per-file-ignores]
"tests/*" = ["N801", "N802", "B011"]  # допускаем вольные имена в тестах

[lint.flake8-bugbear]
# Вызовы FastAPI в значениях по умолчанию (File/Query/Depends и т.п.) — это
# штатный идиоматический приём фреймворка, а не изменяемый дефолт (B008).
extend-immutable-calls = [
    "fastapi.File",
    "fastapi.Form",
    "fastapi.Body",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Depends",
    "fastapi.Security",
]

[format]
quote-style = "double"
indent-style = "space"
