name: CI/CD

# При пуше в main и при пул-реквестах запускаем линтеры и тесты (DO-05).
# При успешном прохождении на ветке main собираем Docker-образы.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Бэкенд — линтер и тесты
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Линтер (ruff)
        run: ruff check .

      - name: Тесты (pytest)
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Фронтенд — линтер и сборка
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Установка зависимостей
        run: npm install

      - name: Линтер (eslint)
        run: npm run lint

      - name: Сборка
        run: npm run build

  build-images:
    name: Сборка Docker-образов
    runs-on: ubuntu-latest
    # Образы собираем только после успешных проверок и только на ветке main.
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Сборка образа бэкенда
        run: docker build -t knowledge-backend:latest ./backend

      - name: Сборка образа фронтенда
        run: docker build -t knowledge-frontend:latest ./frontend
