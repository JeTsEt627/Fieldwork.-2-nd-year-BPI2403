# Конфигурация Prometheus (DO-06).
# Собирает метрики с бэкенда (эндпоинт /metrics) и с самого Prometheus.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
